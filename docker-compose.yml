version: '3.1'

services:
  mysql:
    image: mysql/mysql-server:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=admin
      - MYSQL_DATABASE=gajana
      - MYSQL_ONETIME_PASSWORD=false
      - MYSQL_ROOT_HOST=%
    ports:
      - '16000:3306'
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
